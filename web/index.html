<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Job Application Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<div class="app-container">

    <div class="card">

        <div class="header">
            <h1>💼 Apply Now</h1>
            <p>Start your journey with us</p>
        </div>

        <form action="http://<INTERNAL-LB-DNS>/submit.php" method="POST">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@email.com" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+91 9876543210" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <input type="text" name="role" placeholder="DevOps Engineer" required>
            </div>

            <div class="input-group">
                <label>Experience (Years)</label>
                <input type="number" name="experience" min="0" placeholder="2" required>
            </div>

            <button type="submit">🚀 Submit Application</button>

        </form>

        <div class="footer">
            <p><b>3-Tier Architecture Project</b></p>
        </div>

    </div>

</div>

</body>
</html>
